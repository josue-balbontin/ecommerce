<div class="carrito-container">
  <div class="carrito-header">
    <h2>Carrito de Compras</h2>
    <button class="btn-limpiar" *ngIf="!estaVacio()" (click)="limpiarCarrito()">
      Limpiar Carrito
    </button>
  </div>

  <div class="carrito-vacio" *ngIf="estaVacio()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
      <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
    </svg>
    <p>Tu carrito está vacío</p>
    <span>Agrega productos para comenzar tu compra</span>
  </div>

  <div class="carrito-items" *ngIf="!estaVacio()">
    <div class="item-carrito" *ngFor="let item of items">
      <img [src]="item.producto.imagen" [alt]="item.producto.nombre" class="item-imagen">
      
      <div class="item-info">
        <h3 class="item-nombre">{{ item.producto.nombre }}</h3>
        <p class="item-marca">{{ item.producto.marca }}</p>
        <p class="item-precio">${{ item.producto.precio.toFixed(2) }}</p>
      </div>

      <div class="item-acciones">
        <div class="cantidad-control">
          <button class="btn-cantidad" (click)="disminuirCantidad(item.producto.id)">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 13H5v-2h14v2z"/>
            </svg>
          </button>
          <span class="cantidad">{{ item.cantidad }}</span>
          <button class="btn-cantidad" (click)="aumentarCantidad(item.producto.id)">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
          </button>
        </div>
        
        <p class="item-subtotal">${{ (item.producto.precio * item.cantidad).toFixed(2) }}</p>
        
        <button class="btn-eliminar" (click)="removerProducto(item.producto.id)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="carrito-footer" *ngIf="!estaVacio()">
    <div class="total-container">
      <span class="total-label">Total:</span>
      <span class="total-precio">${{ total.toFixed(2) }}</span>
    </div>
    <button class="btn-comprar">Proceder al Pago</button>
  </div>
</div>
